<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HINO iTRAQ AI 省油 · 安全 智慧夥伴 — App</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
 :root{
 --bg:#eef2f4;--bg2:#f4f8f9;--card:#ffffff;--card2:#eef3f4;--line:#dbe3e6;
 --txt:#1c2b31;--mut:#5d7480;--mut2:#8ca0a9;--accent:#7bb42e;--teal:#14414f;
 --grad:linear-gradient(135deg,#9aca3c,#7bb42e);--good:#43a047;--warn:#e8961b;--bad:#e5484d;--info:#7e57c2;
 --badbg:#fdeded;--warnbg:#fcf3e2;--goodbg:#eaf6ea;--infobg:#f0eafb;--r:14px;--sh:0 3px 14px rgba(20,65,79,.09);
 --appw:430px;--barh:60px;
 }
 *{box-sizing:border-box;margin:0;padding:0}
 html,body{height:100%}
 body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei",Segoe UI,Roboto,sans-serif;background:#d3dbde;color:var(--txt);line-height:1.55;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
 /* ---------- phone frame ---------- */
 .app{position:relative;width:100%;max-width:var(--appw);height:100vh;margin:0 auto;background:var(--bg);
 box-shadow:0 10px 60px rgba(12,30,38,.28);overflow:hidden;display:flex;flex-direction:column}
 @media(min-width:470px){
 body{padding:22px 0}
 .app{height:calc(100vh - 44px);border-radius:34px;overflow:hidden;border:1px solid #c3cdd1}
 }
 /* ---------- app bar ---------- */
 .appbar{position:sticky;top:0;z-index:30;background:var(--teal);border-bottom:3px solid var(--accent);
 padding:11px 14px;display:flex;align-items:center;gap:11px;min-height:56px}
 .logo{height:32px;border-radius:8px;background:var(--accent);color:var(--teal);display:grid;place-items:center;
 font-size:14px;font-weight:900;letter-spacing:.5px;padding:0 10px;flex:0 0 auto}
 .whoami{flex:1;min-width:0}
 .whoami .nm{font-size:14px;font-weight:850;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .whoami .rl{font-size:11px;color:#a9c6bf;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .barbtn{font:inherit;font-size:12px;font-weight:700;color:#dcecc9;background:rgba(255,255,255,.12);
 border:1px solid rgba(255,255,255,.2);padding:6px 11px;border-radius:9px;cursor:pointer;flex:0 0 auto}
 /* ---------- scroll body ---------- */
 .screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--barh) + 22px)}
 section{margin-top:20px;scroll-margin-top:70px}
 section:first-child{margin-top:4px}
 .sh{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
 .sh h2{font-size:17px;font-weight:850}
 .sh h2.sm{font-size:15px}
 .sh .tag{font-size:11px;color:var(--mut)}
 .sh .num{font-size:11px;font-weight:800;color:#fff;background:var(--bad);border-radius:20px;padding:2px 9px}
 .subt{font-size:12px;color:var(--mut2);margin-bottom:11px}
 /* ---------- generic card ---------- */
 .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh)}
 .card+.card{margin-top:10px}
 /* ---------- TODO action center ---------- */
 .todos{display:flex;flex-direction:column;gap:10px}
 .todo{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:var(--r);
 padding:13px 14px;box-shadow:var(--sh);display:flex;flex-direction:column}
 .todo.bad{border-left-color:var(--bad)}.todo.warn{border-left-color:var(--warn)}.todo.info{border-left-color:var(--info)}
 .todo .cat{font-size:10.5px;font-weight:800;letter-spacing:.4px;color:var(--mut);text-transform:uppercase;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
 .todo .tt{font-size:15px;font-weight:800;margin:4px 0 4px}
 .todo .dt{font-size:12.5px;color:var(--mut)}
 .todo .acts{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:11px}
 .tdata{border-top:1px solid var(--line);margin-top:11px;padding-top:11px;font-size:12.5px;color:var(--mut);line-height:1.75}
 .tdata b{color:var(--accent)}
 /* ---- 老闆端「已自動處理 / 已委派」狀態列（唯讀，非按鈕） ---- */
 .autoline{display:flex;align-items:flex-start;gap:8px;margin-top:11px;padding:9px 11px;background:#f0f6ea;border:1px solid #d8e7c0;border-radius:10px;font-size:12px;color:#3c5b1c;line-height:1.55}
 .autoline .abadge{flex:0 0 auto;font-size:10px;font-weight:800;color:#fff;background:var(--accent);border-radius:20px;padding:2px 8px;white-space:nowrap}
 .autoline .abadge.dg{background:var(--teal)}
 .decidetag{font-size:10px;font-weight:800;color:#fff;background:var(--warn);border-radius:20px;padding:2px 8px}
 /* ---- AI 自動化授權開關 ---- */
 .swrow{display:flex;align-items:flex-start;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line)}
 .swrow:last-child{border-bottom:none}
 .swrow .si{flex:1}.swrow .si .st{font-size:13px;font-weight:800}.swrow .si .sd{font-size:11.5px;color:var(--mut);margin-top:2px;line-height:1.55}
 .sw{flex:0 0 auto;width:44px;height:26px;border-radius:20px;background:var(--line);position:relative;cursor:pointer;transition:.2s;border:none;padding:0}
 .sw.on{background:var(--accent)}
 .sw::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
 .sw.on::after{left:21px}
 /* ---------- buttons (touch-friendly) ---------- */
 .btn{font:inherit;font-size:13px;font-weight:700;border:none;border-radius:10px;padding:10px 14px;cursor:pointer;
 transition:.15s;white-space:nowrap;min-height:40px;display:inline-flex;align-items:center;justify-content:center}
 .btn:active{transform:translateY(1px)}
 .btn.pri{background:var(--grad);color:#04121f}.btn.gho{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
 .btn.dng{background:var(--bad);color:#fff}.btn.warnb{background:var(--warn);color:#fff}.btn.gd{background:var(--good);color:#fff}
 .btn.sm{padding:8px 12px;font-size:12px;min-height:36px}
 .btn.block{width:100%}
 .btn:disabled{opacity:.45;cursor:not-allowed}
 /* ---------- AI advice ---------- */
 .advice{display:flex;flex-direction:column;gap:10px}
 .adv{background:#f4f9ec;border:1px solid #d8e7c0;border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh)}
 .adv .f{font-size:14px;font-weight:800;margin-bottom:4px}.adv .f b{color:#4e7d1f}
 .adv .why{font-size:12.5px;color:var(--mut);margin-bottom:8px}
 .adv .rec{font-size:12.5px;color:var(--txt);margin-bottom:10px}
 .adv .acts{display:flex;gap:7px;flex-wrap:wrap}
 /* ---------- list-item (mobile replacement for table rows) ---------- */
 .litem{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh)}
 .litem+.litem{margin-top:9px}
 .litem .lh{display:flex;align-items:center;gap:9px}
 .litem .lh .nm{font-size:14.5px;font-weight:800;display:flex;align-items:center;gap:7px}
 .litem .lh .chev{margin-left:auto;color:var(--accent);font-size:13px}
 .litem .stats{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:9px;font-size:12px;color:var(--mut)}
 .litem .stats b{font-weight:800}
 .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;display:inline-block}
 .regdet{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:none;flex-direction:column;gap:2px}
 .regdet.on{display:flex}
 /* ---------- driver line ---------- */
 .drvline{display:flex;align-items:center;gap:8px;padding:9px 8px;border-radius:10px;flex-wrap:wrap;font-size:12.5px;background:var(--bg2);border:1px solid var(--line)}
 .drvline+.drvline{margin-top:6px}
 .drvline .who{display:flex;align-items:center;gap:7px;flex:1 1 100%}
 .drvline .who b{font-size:13px}
 .drvline .mt2{font-size:11px;color:var(--mut);flex:1 1 100%;padding-left:17px}
 .drvline .row2{display:flex;align-items:center;gap:7px;flex-wrap:wrap;width:100%;padding-left:17px}
 .lvpill{font-size:11px;font-weight:800;border:1px solid;border-radius:20px;padding:1px 9px}
 .ntag{font-size:11px;font-weight:700}
 .upill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px}
 .u-bad{background:var(--badbg);color:var(--bad)}.u-warn{background:var(--warnbg);color:var(--warn)}.u-info{background:var(--infobg);color:var(--info)}
 .quickacts{display:flex;flex-direction:column;gap:8px;margin-top:12px}
 /* ---------- trend chart ---------- */
 .chartcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 14px 6px;box-shadow:var(--sh)}
 .chartcard .ch-h{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap}
 .chartcard .ttl{font-weight:800;font-size:14px}.chartcard .now{font-size:15px;font-weight:850;margin-left:auto}.chartcard .sub{font-size:11px;color:var(--mut)}
 svg.lc{width:100%;height:auto;display:block}.lc text{font-size:11px;fill:var(--mut2);font-family:inherit}
 .regsel{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:2px 0 12px;padding-bottom:4px;scrollbar-width:none}
 .regsel::-webkit-scrollbar{display:none}
 .regchip{font-size:12.5px;font-weight:700;color:var(--mut);background:var(--card);border:1px solid var(--line);
 padding:8px 13px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;flex:0 0 auto}
 .regchip.on{color:#04121f;background:var(--grad);border-color:transparent}.regchip .dot{width:8px;height:8px}
 .cause{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--warn);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh)}
 .cause .h{font-weight:800;font-size:14px;margin-bottom:6px}
 .cause ul{margin:4px 0 11px 18px;font-size:12.5px;color:var(--mut)}.cause li{margin:3px 0}
 .cause .acts{display:flex;gap:8px;flex-wrap:wrap}
 /* ---------- bar ranking ---------- */
 .bars{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh)}
 .bar-row{display:grid;grid-template-columns:88px 1fr 62px;align-items:center;gap:9px;padding:6px 0}
 .bar-name{font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .bar-track{height:16px;background:var(--bg2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
 .bar-fill{height:100%;border-radius:6px 0 0 6px;transition:width .5s}
 .bar-fill.good{background:linear-gradient(90deg,#43a047,#7bb42e)}.bar-fill.bad{background:linear-gradient(90deg,#c62828,#e5484d)}.bar-fill.mid{background:linear-gradient(90deg,#c6ced3,#9fb0b8)}
 .bar-val{font-size:12px;font-weight:800;text-align:right}.rk{width:16px;text-align:center}
 .bar-leg{font-size:11.5px;color:var(--mut);margin-top:9px;display:flex;gap:12px;flex-wrap:wrap}.bar-leg b.g{color:var(--good)}.bar-leg b.r{color:var(--bad)}
 .dimsol{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;margin-top:12px;box-shadow:var(--sh)}
 .dimsol .h{font-weight:800;font-size:14px}.dimsol ul{margin:9px 0 11px 18px;font-size:12.5px;color:var(--mut)}.dimsol li{margin:4px 0}
 .dimsol .acts{display:flex;gap:8px;flex-wrap:wrap}
 /* ---------- kpi ---------- */
 .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
 .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;box-shadow:var(--sh)}
 .kpi .k{font-size:11.5px;color:var(--mut)}.kpi .v{font-size:24px;font-weight:850;margin-top:3px}.kpi .s{font-size:11px;margin-top:2px;color:var(--mut2)}
 /* ---------- staffing panel ---------- */
 .staffrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:12.5px}
 .staffrow:last-child{border-bottom:none}
 .staffrow .nm{font-weight:800;display:flex;align-items:center;gap:6px;width:74px}
 .staffrow .mid{flex:1;color:var(--mut)}
 .staffrow .bd{font-weight:800;text-align:right}
 /* ---------- shipper view ---------- */
 .eta-hero{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;margin-bottom:5px}
 .eta-hero .big{font-size:40px;font-weight:850;color:var(--accent);line-height:1}
 .eta-hero .lbl{font-size:13px;color:var(--mut)}
 .mapwrap{border:1px solid var(--line);border-radius:13px;overflow:hidden;margin:13px 0}
 .lmap{width:100%;height:220px;background:#eaf1f2}
 .leaflet-container{font-family:inherit;background:#eaf1f2}
 .leaflet-control-attribution{font-size:9px}
 .mkdot{border-radius:50%;box-shadow:0 0 0 3px rgba(255,255,255,.9),0 1px 4px rgba(0,0,0,.35);box-sizing:border-box}
 .mkring{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4);box-sizing:border-box}
 .tline{display:flex;justify-content:space-between;margin:6px 0 14px;position:relative}
 .tline::before{content:"";position:absolute;top:8px;left:8%;right:8%;height:2px;background:var(--line)}
 .tstep{display:flex;flex-direction:column;align-items:center;gap:6px;z-index:1;flex:1}
 .tstep .d{width:16px;height:16px;border-radius:50%;background:var(--card2);border:2px solid var(--line)}
 .tstep.done .d{background:var(--good);border-color:var(--good)}
 .tstep.cur .d{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 5px rgba(123,180,46,.28)}
 .tstep .t{font-size:11px;color:var(--mut2)}.tstep.cur .t,.tstep.done .t{color:var(--txt)}
 .drvbar{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;flex-wrap:wrap}
 .drvbar .av{width:38px;height:38px;border-radius:50%;background:var(--card2);display:grid;place-items:center;font-size:17px}
 .shipcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh)}
 .shipcard+.shipcard{margin-top:9px}
 .shipcard .top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
 .shipcard .id{font-weight:800;font-size:14px}
 .shipcard .cust{font-size:12.5px;color:var(--mut);margin-top:3px}
 .shipcard .acts{display:flex;gap:7px;margin-top:10px}
 .stpill{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap}
 .st-go{background:var(--infobg);color:var(--info)}.st-soon{background:var(--goodbg);color:var(--good)}.st-risk{background:var(--badbg);color:var(--bad)}.st-done{background:#e7edef;color:var(--mut)}
 /* ---------- welcome / role picker ---------- */
 .welcome{padding:26px 18px 30px}
 .wtitle{text-align:center;margin-bottom:22px}
 .wtitle .big{font-size:32px;font-weight:850;color:var(--good)}
 .wtitle .sub{font-size:13px;color:var(--mut2);margin-top:4px}
 .wpick .lbl{font-weight:850;font-size:18px;margin-bottom:3px}
 .wpick .desc{color:var(--mut2);margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:7px}
 .wpick .q{display:inline-grid;place-items:center;width:17px;height:17px;border-radius:50%;background:var(--good);color:#fff;font-size:11px;font-weight:800}
 .idcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 16px;margin-bottom:12px;cursor:pointer;box-shadow:var(--sh);transition:.15s;position:relative}
 .idcard:hover,.idcard:active{border-color:var(--accent);transform:translateY(-2px)}
 .idcard .ih{font-weight:850;font-size:16px;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
 .idcard .idesc{font-size:12.5px;color:var(--mut);line-height:1.7}
 .newbadge{display:inline-block;font-size:10px;font-weight:800;color:var(--teal);background:var(--accent);border-radius:20px;padding:1px 8px;vertical-align:middle}
 .idcard .nb{position:absolute;top:14px;right:14px}
 .verhint{text-align:center;color:var(--mut2);font-size:11.5px;margin-top:18px}
 /* ---------- login page ---------- */
 .loginpg{padding:24px 20px}
 .loginpg .back{font-size:13px;color:var(--mut);background:none;border:none;cursor:pointer;padding:6px 0;margin-bottom:8px;display:inline-flex;align-items:center;gap:4px}
 .loginpg h2{text-align:center;font-size:21px;font-weight:850;margin:8px 0 4px}
 .loginpg .rsub{text-align:center;font-size:12.5px;color:var(--mut2);margin-bottom:22px}
 .field{margin-bottom:14px}
 .field label{display:block;font-size:12px;font-weight:700;color:var(--mut);margin-bottom:6px}
 .field input{width:100%;font:inherit;font-size:15px;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--txt)}
 .field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(123,180,46,.15)}
 .demohint{background:var(--goodbg);border:1px dashed var(--accent);border-radius:12px;padding:12px 14px;font-size:12.5px;color:#3c5b1c;margin:6px 0 18px;line-height:1.7}
 .demohint b{color:#2e4d0f}
 .demohint .fill{margin-top:9px}
 /* ---------- bottom tab bar ---------- */
 .tabbar{position:sticky;bottom:0;z-index:40;display:flex;background:#fff;border-top:1px solid var(--line);
 box-shadow:0 -2px 14px rgba(20,65,79,.07);height:var(--barh);flex:0 0 auto}
 .tabbar button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
 font:inherit;color:var(--mut2);padding:6px 2px}
 .tabbar button .l{font-size:12.5px;font-weight:700}
 .tabbar button.on{color:var(--accent)}
 .tabbar button.on .l{color:var(--teal)}
 /* ---------- tour ---------- */
 #tourMask{position:absolute;inset:0;z-index:80;display:none}#tourMask.on{display:block}
 #tourHole{position:absolute;border-radius:12px;box-shadow:0 0 0 9999px rgba(15,35,45,.72);pointer-events:none;transition:top .25s,left .25s,width .25s,height .25s}
 #tourTip{position:absolute;max-width:290px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:0 12px 44px rgba(0,0,0,.32);z-index:81}
 #tourTip .tt{font-weight:850;font-size:14px;margin-bottom:5px}
 #tourTip .tx{font-size:12.5px;color:var(--mut);margin-bottom:13px;line-height:1.6}
 #tourTip .tb{display:flex;gap:8px;justify-content:space-between;align-items:center}#tourTip .step{font-size:11px;color:var(--mut2)}
 .hidden{display:none!important}
 /* ---------- toasts (inside frame) ---------- */
 #toasts{position:absolute;left:12px;right:12px;bottom:calc(var(--barh) + 12px);z-index:60;display:flex;flex-direction:column;gap:8px;pointer-events:none}
 .toast{background:var(--card2);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:11px;padding:11px 14px;font-size:12.5px;box-shadow:var(--sh);animation:slin .25s}
 .toast.ok{border-left-color:var(--good)}.toast.dn{border-left-color:var(--bad)}.toast.wn{border-left-color:var(--warn)}.toast b{display:block;margin-bottom:2px}
 @keyframes slin{from{opacity:0;transform:translateY(12px)}to{opacity:1}}
 /* ---------- modal (inside frame) ---------- */
 .ov{position:absolute;inset:0;background:rgba(18,42,52,.5);z-index:70;display:none;place-items:end center;padding:0}
 .ov.on{display:grid}
 .modal{background:var(--card);border-top-left-radius:20px;border-top-right-radius:20px;padding:20px 18px calc(20px + env(safe-area-inset-bottom));
 width:100%;box-shadow:var(--sh);max-height:88%;overflow:auto;animation:sheetup .25s}
 @keyframes sheetup{from{transform:translateY(30px);opacity:.4}to{transform:translateY(0);opacity:1}}
 .modal h3{font-size:17px;margin-bottom:6px}.modal p{font-size:12.5px;color:var(--mut);margin-bottom:13px}
 .modal .mb{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px}
 .modal .mb .btn{flex:1}
 .mrow{display:flex;align-items:center;gap:10px;padding:11px 4px;border-radius:10px;border-bottom:1px solid var(--line);flex-wrap:wrap}
 .mrow:last-child{border-bottom:none}.mrow .nm{font-size:13px;font-weight:700}.mrow .mt{font-size:11.5px;color:var(--mut)}
 .mrow .ma{width:100%;display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
 .mrow input[type=checkbox]{width:19px;height:19px;accent-color:var(--accent);flex:0 0 auto}
 .plan{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
 .plan.rec{border-color:var(--accent);background:#f2f8e7}
 .plan .ph{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;margin-bottom:5px}

function lineChart(series,opts){
 opts=opts||{};
 const pred=opts.predict||[]; // 未來預測值（接在歷史後面）
 const nFut=pred.length,total=MONTHS.length+nFut;
 const W=560,H=220,pl=40,pr=14,pt=12,pb=24;
 const all=series.flatMap(s=>s.vals).concat(pred);
 let mn=opts.min!=null?opts.min:Math.min(...all),mx=opts.max!=null?opts.max:Math.max(...all);if(mn===mx){mn-=1;mx+=1;}const pad=(mx-mn)*.12;mn-=pad;mx+=pad;
 const x=i=>pl+(W-pl-pr)*(i/(total-1)),y=v=>pt+(H-pt-pb)*(1-(v-mn)/(mx-mn));
 let g="";for(let k=0;k<=3;k++){const gv=mn+(mx-mn)*k/3,gy=y(gv);g+=`<line x1="${pl}" y1="${gy}" x2="${W-pr}" y2="${gy}" stroke="#e4ebed"/><text x="${pl-6}" y="${gy+4}" text-anchor="end">${Math.round(gv)}</text>`;}
 const futLbl=['12月','1月','2月'];
 MONTHS.forEach((m,i)=>{if(i%2===0||i===MONTHS.length-1)g+=`<text x="${x(i)}" y="${H-7}" text-anchor="middle">${m}</text>`;});
 pred.forEach((_,k)=>{g+=`<text x="${x(MONTHS.length+k)}" y="${H-7}" text-anchor="middle" fill="#a08bd0">${futLbl[k]||''}</text>`;});
 // 預測區底色 + 分隔線
 if(nFut){const sx=x(MONTHS.length-1);g+=`<rect x="${sx}" y="${pt}" width="${W-pr-sx}" height="${H-pt-pb}" fill="#f2edfb" opacity=".7"/><line x1="${sx}" y1="${pt}" x2="${sx}" y2="${H-pb}" stroke="#c9b8e8" stroke-dasharray="3 3"/><text x="${(sx+W-pr)/2}" y="${pt+12}" text-anchor="middle" fill="#7e57c2" font-size="10">AI 預測（線性趨勢外推）</text>`;}
 let ln="";series.forEach(s=>{const p=s.vals.map((v,i)=>`${x(i)},${y(v)}`).join(" ");ln+=`<polyline points="${p}" fill="none" stroke="${s.color}" stroke-width="${s.bold?3:1.5}" opacity="${s.bold?1:.45}" stroke-linejoin="round"/>`;if(s.bold)s.vals.forEach((v,i)=>ln+=`<circle cx="${x(i)}" cy="${y(v)}" r="${i===s.vals.length-1?4:2.4}" fill="${s.color}"/>`);});
 // 預測虛線（接續主線末端）
 if(nFut){const lastI=MONTHS.length-1,lastV=series.find(s=>s.bold).vals.at(-1);const pts=[[x(lastI),y(lastV)]].concat(pred.map((v,k)=>[x(MONTHS.length+k),y(v)]));
 ln+=`<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="#7e57c2" stroke-width="2.6" stroke-dasharray="5 4" stroke-linejoin="round"/>`+pred.map((v,k)=>`<circle cx="${x(MONTHS.length+k)}" cy="${y(v)}" r="3.2" fill="#7e57c2"/>`).join('');}
 return `<svg class="lc" viewBox="0 0 ${W} ${H}">${g}${ln}</svg>`;
}
// 各面向的未來 3 個月 AI 預測值（線性趨勢外推，非情境模擬）
function metricPredict(m){
 const d=m.data,last=d.at(-1),slope=(d.at(-1)-d.at(-4))/3;
 if(m.key==='safety')return null; // 安全分改在專屬預測卡呈現
 // 百分比類（怠速/油耗）加上下限夾制，避免單調累積序列給出無意義外推
 const pct=m.key==='idle'||m.key==='fuel';
 return [1,2,3].map(k=>{let v=last+slope*k;if(pct)v=Math.max(0,Math.min(100,v));return +v.toFixed(1);});
}

let shipMap=null,truckMarker=null;
// 純色圓點 marker（L.divIcon，無 emoji）
function dotIcon(color,size,ring){size=size||16;
 const cls=ring?'mkring':'mkdot';const bg=ring?`border-color:${color};background:${color}`:`background:${color}`;
 return L.divIcon({className:'',html:`<div class="${cls}" style="width:${size}px;height:${size}px;${bg}"></div>`,iconSize:[size,size],iconAnchor:[size/2,size/2]});}
// 沿真實 polyline 依 progress(0–1) 做經緯度線性插值，回傳 [lat,lng]
function interpLL(route,p){
 if(!route||route.length<2)return route&&route[0];
 p=Math.max(0,Math.min(1,p));
 // 依各段實際長度佔比分配，移動更符合真實距離
 const segs=[];let total=0;
 for(let i=0;i<route.length-1;i++){const a=route[i],b=route[i+1];
 const dy=(b[0]-a[0])*111,dx=(b[1]-a[1])*101;const len=Math.hypot(dx,dy);segs.push(len);total+=len;}
 let want=p*total,acc=0;
 for(let i=0;i<segs.length;i++){
 if(acc+segs[i]>=want||i===segs.length-1){const a=route[i],b=route[i+1];const t=segs[i]?(want-acc)/segs[i]:0;
 return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];}
 acc+=segs[i];}
 return route[route.length-1];
}
// 在 .mapwrap 內初始化 Leaflet，畫真實路線 + 起訖點 + 卡車
function initShipMap(o){
 if(shipMap){shipMap.remove();shipMap=null;truckMarker=null;}
 const elm=document.getElementById('shipMap');if(!elm||typeof L==='undefined')return;
 shipMap=L.map(elm,{zoomControl:false,attributionControl:true,dragging:false,scrollWheelZoom:false,doubleClickZoom:false,tap:false});
 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,subdomains:'abc',attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'}).addTo(shipMap);
 const route=o.routeLL;
 // 底線（淺）＋主路線（綠）
 L.polyline(route,{color:'#cfdadd',weight:9,lineCap:'round'}).addTo(shipMap);
 L.polyline(route,{color:o.risk?'#e5484d':'#7bb42e',weight:4,opacity:.92,lineCap:'round'}).addTo(shipMap);
 // 起點（深色圓點）＋終點（紅圈）
 L.marker(o.fromLL,{icon:dotIcon('#14414f',14)}).addTo(shipMap).bindTooltip(o.from,{direction:'top',offset:[0,-8]});
 L.marker(o.toLL,{icon:dotIcon('#f87171',18,true)}).addTo(shipMap).bindTooltip(o.to,{direction:'top',offset:[0,-10]});
 // 卡車 marker（純色圓點，沿真實座標移動）
 truckMarker=L.marker(interpLL(route,o.progress),{icon:dotIcon('#7bb42e',20,true),zIndexOffset:1000}).addTo(shipMap);
 shipMap.fitBounds(L.latLngBounds(route),{padding:[26,26]});
 // bottom-sheet/tab 切換後容器尺寸才正確，需重算
 setTimeout(()=>{if(shipMap)shipMap.invalidateSize();},150);
 setTimeout(()=>{if(shipMap)shipMap.invalidateSize();},450);
}
function positionTruck(p,o){if(!truckMarker||!o)return;truckMarker.setLatLng(interpLL(o.routeLL,Math.min(p,1)));}
function startAnim(o){if(animTimer)clearInterval(animTimer);let p=o.progress;
 animTimer=setInterval(()=>{if(p>=1){positionTruck(1,o);clearInterval(animTimer);return;}p=Math.min(1,p+0.006);positionTruck(p,o);
 const denom=(1-o.progress)||1;const eta=Math.max(0,Math.round(o.etaMin*(1-p)/denom));const eb=document.getElementById("etaBig");if(eb)eb.textContent=eta;},1200);}

// 依駕駛實際 iTRAQ 事件，生成「不同」的個人化話術（模擬 GenAI）
function genVoiceScript(name){
 const hit=regions.flatMap(rg=>rg.drivers.map(dv=>({dv,rg}))).find(x=>x.dv.n===name);
 if(!hit)return `${name} 您好，我是車隊安全助理，提醒您行車注意安全、繫好安全帶，行車平安！`;
 const {dv,rg}=hit;const cl=[];
 if(/超速/.test(dv.i))cl.push('系統發現您近月超速偏多，尤其快速道路路段，麻煩依限速行駛');
 if(/急|煞/.test(dv.i))cl.push('您的急煞集中在下班尖峰，提醒您提早減速、拉開安全車距');
 if(/未繫/.test(dv.i))cl.push('請全程繫好安全帶，短程停靠也別忘了');
 if(/疲勞/.test(dv.i)||fatigueSet.has(rg.id+rg.drivers.indexOf(dv)))cl.push('您已連續駕駛偏長，AI 預測下午進入疲勞高風險段，建議先在服務區小休');
 if(/怠速/.test(dv.i)||rg.idlePct>=14)cl.push(`您所屬的${rg.name}怠速偏高，等候時記得熄火，省油又減碳`);
 if(/點檢/.test(dv.i))cl.push('提醒您先完成出車前點檢再上路');
 if(!cl.length)cl.push('您本月表現穩定，繼續保持，安全獎金穩穩入袋');
 return `${name} 您好，我是車隊安全助理。${cl.join('；')}。安全分目前 ${dv.s} 分，若有車況或路況問題回覆即可，行車平安！`;
}

function showTourStep(){const st=tourSteps[tourI];
 if(curTab!==st.tab){gotoTab(st.tab);setTimeout(showTourStep,260);return;}
 const target=document.querySelector(st.sel);if(!target){nextTour();return;}
 target.scrollIntoView({block:'center'});
 setTimeout(()=>{
 const app=document.getElementById('app'),ar=app.getBoundingClientRect(),r=target.getBoundingClientRect();
 const hole=document.getElementById('tourHole'),tip=document.getElementById('tourTip');
 // position relative to app frame
 hole.style.top=(r.top-ar.top-8)+'px';hole.style.left=(r.left-ar.left-8)+'px';
 hole.style.width=(r.width+16)+'px';hole.style.height=(r.height+16)+'px';
 tip.innerHTML=`<div class="tt">${st.t}</div><div class="tx">${st.x}</div><div class="tb"><span class="step">${tourI+1}/${tourSteps.length}</span><span style="display:flex;gap:8px"><button class="btn gho sm" onclick="endTour()">略過</button><button class="btn pri sm" onclick="nextTour()">${tourI===tourSteps.length-1?'完成':'下一步 →'}</button></span></div>`;
 // clamp tooltip inside the phone frame (never wider/taller than the frame)
 tip.style.maxWidth=Math.min(290,ar.width-24)+'px';
 const tw=Math.min(tip.offsetWidth,ar.width-24),th=tip.offsetHeight;
 let tp=(r.bottom-ar.top)+12;
 if(tp+th>ar.height-70)tp=(r.top-ar.top)-th-12;
 tp=Math.max(12,Math.min(tp,ar.height-th-12));
 let lp=Math.max(12,Math.min(r.left-ar.left,ar.width-tw-12));
 tip.style.top=tp+'px';tip.style.left=lp+'px';
 },320);
}

let AI_BACKEND=null; // null=未知, true=有真 AI 後端, false=退回本地模擬

function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// 送給後端的即時 iTRAQ 數據（老闆看全隊、負責人只看自己那一區）
function backendContext(){
 const role=SESSION.role;
 if(role==='fleet'){
 const worstIdle=regions.slice().sort((a,b)=>b.idlePct-a.idlePct)[0];
 const worstSafe=regions.slice().sort((a,b)=>a.safety.at(-1)-b.safety.at(-1))[0];
 return {role,name:SESSION.acc.name,aggSafe:aggSafety.at(-1),
 idle:+(regions.reduce((a,r)=>a+r.idlePct,0)/regions.length).toFixed(1),fuel:31.9,
 worstIdle:{name:worstIdle.name,idlePct:worstIdle.idlePct,fuel:worstIdle.fuel,anomaly:worstIdle.anomaly},
 worstSafe:{name:worstSafe.name,safe:worstSafe.safety.at(-1),anomaly:worstSafe.anomaly},
 regions:regions.map(r=>({name:r.name,safe:r.safety.at(-1),idlePct:r.idlePct,anomaly:r.anomaly,onTime:r.onTime})),
 riskTop:riskForecast.map(f=>({n:f.n,region:f.r,pc:riskScore(f),win:f.win})),
 autoOn:Object.keys(aiAuto).filter(k=>aiAuto[k]).map(k=>aiAutoMeta[k].t).join('、')||'（全部關閉）'};
 }
 const r=myRegion();
 return {role,name:SESSION.acc.name,region:r.name,aggSafe:aggSafety.at(-1),
 safe:r.safety.at(-1),idle:r.idlePct,fuel:r.fuel,anomaly:r.anomaly,overload:r.overload,
 drivers:r.drivers.map(d=>({n:d.n,s:d.s,i:d.i}))};
}
// 對話入口：老闆/負責人優先走真 LLM 串流；失敗或無後端則退回本地模擬
async function aiAsk(q){
 if(chatTyping)clearInterval(chatTyping);
 const log=document.getElementById('chatlog');if(!log)return;
 log.appendChild(el(`<div class="bub me">${escapeHtml(q)}</div>`));
 log.scrollTop=log.scrollHeight;

// 真 LLM：POST /api/chat（SSE 串流逐字浮現）
async function streamBackend(q,log){
 const bub=el(`<div class="bub ai"><div class="lbl">${AI_TAG}</div><span class="btxt"></span><span class="caret"></span></div>`);
 log.appendChild(bub);log.scrollTop=log.scrollHeight;
 const target=bub.querySelector('.btxt');
 target.innerHTML='<span style="color:var(--mut2)">分析你的 iTRAQ 數據中…</span>';
 let acc='',first=true;
 try{
 const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({context:backendContext(),question:q})});
 if(!resp.ok||!resp.body)throw new Error('no-stream');
 const reader=resp.body.getReader(),dec=new TextDecoder();let buf='';
 for(;;){
 const {value,done}=await reader.read();if(done)break;
 buf+=dec.decode(value,{stream:true});
 const parts=buf.split('\n\n');buf=parts.pop();
 for(const p of parts){
 const line=p.split('\n').find(l=>l.startsWith('data:'));if(!line)continue;
 let d;try{d=JSON.parse(line.slice(5).trim());}catch(e){continue;}
 if(d.error)throw new Error(d.error);
 if(d.delta){if(first){target.innerHTML='';first=false;}acc+=d.delta;target.innerHTML=mdLite(acc);log.scrollTop=log.scrollHeight;}
 }
 }
 const cr=bub.querySelector('.caret');if(cr)cr.remove();
 if(!acc.trim())throw new Error('empty');
 addChatActions(bub,q);
 }catch(e){
 // 後端失敗 → 移除泡泡並退回本地模擬（不讓評審看到錯誤）
 AI_BACKEND=false;bub.remove();aiAskLocal(q);
 }
}
// 本地模擬（資料拼裝 + 打字動畫）：無後端、駕駛/個人端、或後端失敗時使用
function aiAskLocal(q){
 if(chatTyping)clearInterval(chatTyping);
 const log=document.getElementById('chatlog');if(!log)return;
 const full=aiGenerate(q);
 const bub=el(`<div class="bub ai"><span id="typing"></span><span class="caret"></span></div>`);
 log.appendChild(bub);log.scrollTop=log.scrollHeight;
 const target=bub.querySelector('#typing');
 // 逐字：以「已渲染字元數」推進，讓 HTML 標籤一次吐完不會破版
 const plain=full.replace(/<[^>]+>/g,'');
 const totalLen=plain.length;let i=0;const speed=18,step=3;
 // 先顯示 0.6s「分析中」佔位，觀感更接近生成式串流
 let pause=Math.round(600/speed);
 chatTyping=setInterval(()=>{
 if(pause>0){pause--;target.innerHTML='<span style="color:var(--mut2)">分析你的 iTRAQ 數據中…</span>';return;}
 i+=step;
 target.innerHTML=revealHtml(full,i);
 log.scrollTop=log.scrollHeight;
 // 標點後插入 1–2 拍思考停頓，節奏更像 LLM
 const last=plain[Math.min(i,totalLen)-1];
 if(last==='。'||last==='\n'||last==='：')pause=2;
 if(i>=totalLen){clearInterval(chatTyping);chatTyping=null;const cr=bub.querySelector('.caret');if(cr)cr.remove();
 // 生成結束後給快捷後續動作
 addChatActions(bub,q);}
 },speed);
}
// 計算純文字長度（不含標籤）
function stripLen(html){return html.replace(/<[^>]+>/g,'').length;}
// 逐字顯示：保留完整標籤，只截斷可見文字
function revealHtml(html,n){
 let out='',shown=0,i=0;
 while(i<html.length&&shown<n){
 if(html[i]==='<'){const j=html.indexOf('>',i);out+=html.slice(i,j+1);i=j+1;}
 else{out+=html[i];shown++;i++;}
 }
 // 補齊尚未關閉的標籤到結尾（避免破版）——直接把剩餘標籤接上
 while(i<html.length){if(html[i]==='<'){const j=html.indexOf('>',i);out+=html.slice(i,j+1);i=j+1;}else break;}
 return out;
}

 else if(q.includes('安全')||q.includes('風險'))btns=`<button class="btn pri sm" onclick="act('已開啟時段提醒，AI 會提前 30 分主動提醒你。','ok')">開啟時段提醒</button>`;
 else if(q.includes('獎金')||q.includes('提分'))btns=`<button class="btn pri sm" onclick="act('已為你排定 7 天安全提分計畫。','ok')">排 7 天提分計畫</button>`;
 }else if(c.role==='lead'){
 if(q.includes('油')||q.includes('怠速'))btns=`<button class="btn pri sm" onclick="act('已對本區啟動 AI 省油教練並設怠速目標 ≤8%。','ok');closeOv()">一鍵啟動省油教練</button>`;
 else if(q.includes('風險')||q.includes('事故'))btns=`<button class="btn pri sm" onclick="act('已對高風險駕駛發送事前預警。','wn');closeOv()">發送事前預警</button>`;
 else if(q.includes('提醒')||q.includes('擬'))btns=`<button class="btn pri sm" onclick="act('已群發省油提醒給本區駕駛。','ok');closeOv()">一鍵群發</button>`;
 }else{
 if(q.includes('耗油')||q.includes('油'))btns=`<button class="btn pri sm" onclick="act('已對高耗油區發起全隊省油競賽。','ok');closeOv()">發起省油競賽</button>`;
 else if(q.includes('風險')||q.includes('事故'))btns=`<button class="btn pri sm" onclick="closeOv();gotoTab('todo')">查看預警與介入狀態</button>`;
 else if(q.includes('效益')||q.includes('導入'))btns=`<button class="btn pri sm" onclick="closeOv();gotoTab('me')">看完整效益</button>`;
 }
 if(btns)bub.appendChild(el(`<div style="margin-top:9px">${btns}</div>`));
 document.getElementById('chatlog').scrollTop=99999;
}

/* =====================================================================

===================================================================== */
function openFuelCoach(name){
 // name 傳入時查駕駛，否則用登入駕駛
 let d,r;
 if(name){const hit=regions.flatMap(rg=>rg.drivers.map(dv=>({dv,rg}))).find(x=>x.dv.n===name);if(hit){d=hit.dv;r=hit.rg;}}
 if(!d){const m=myDriver();d=m.d;r=m.r;}
 const tips=[];
 if(/怠速/.test(d.i)||r.idlePct>=14)tips.push({h:'怠速空轉',x:`你怠速約 ${r.idlePct}%，等候或裝卸貨超過 90 秒就熄火，一天約少燒 1.5–2L。`});
 if(/急/.test(d.i)||/煞/.test(d.i))tips.push({h:'急加速／急煞',x:'起步輕油門、看遠一點提早鬆油滑行，市區油耗可再降 4–6%。'});
 if(/超速/.test(d.i))tips.push({h:'高速巡航',x:'維持 80–90 km/h 經濟時速，避免高轉速，長途最省油。'});
 tips.push({h:'車輛維護',x:'胎壓不足會多耗 3%，出車前確認胎壓、定期換空濾。'});
 const list=tips.slice(0,3).map((t,i)=>`<div class="plan ${i===0?'rec':''}"><div class="ph">${i+1}. ${t.h}${i===0?'<span class="rb">最有感</span>':''}</div><div class="pd">${t.x}</div></div>`).join('');
 showModal(`<h3>AI 省油教練 — ${d.n} ${AI_TAG}</h3>
 <p>依你的 iTRAQ 數據（怠速 ${r.idlePct}%、油耗 ${r.fuel}L、${d.i}）即時生成的 3 條個人化省油教學：</p>
 ${list}
 <div class="mb"><button class="btn gho" onclick="closeOv()">關閉</button><button class="btn pri" onclick="act('已把 3 條省油建議設為 ${d.n} 的今日任務。','ok');closeOv()">設為今日任務</button></div>`);
}

/* =====================================================================
 AI 安全教練（事前預測）— 出車前風險評估，生成今日安全叮嚀
===================================================================== */
function openSafetyCoach(name){
 let d,r;
 if(name){const hit=regions.flatMap(rg=>rg.drivers.map(dv=>({dv,rg}))).find(x=>x.dv.n===name);if(hit){d=hit.dv;r=hit.rg;}}
 if(!d){const m=myDriver();d=m.d;r=m.r;}
 const fat=fatigueSet.has(SESSION.role==='driver'||SESSION.role==='personal'?SESSION.acc.drvCode:'');
 const risks=[];
 if(fat)risks.push({h:'疲勞高風險段（事前）',x:'依你連續駕駛時數與歷史疲勞時段，AI 預測今天 15–17 時最易疲勞，建議先在服務區排 15 分小休。'});
 if(/超速/.test(d.i))risks.push({h:'超速路段預警',x:'你的超速多在快速道路，今日路線經過大雅段，請提前留意限速與測速。'});
 if(/急|煞/.test(d.i))risks.push({h:'急煞熱點',x:'你的急煞熱點在市區下班尖峰(17–19時)，提早減速、拉開安全車距。'});
 if(/未繫/.test(d.i))risks.push({h:'安全帶',x:'你短程多停常忘記繫，DMS 會即時提醒，請養成上車先繫。'});
 if(!risks.length)risks.push({h:'今日低風險',x:'各項指標在安全範圍，維持專注、繫好安全帶即可。'});
 const level=fat?['高','var(--bad)']:risks.length>=2?['中','var(--warn)']:['低','var(--good)'];
 const list=risks.slice(0,3).map((t,i)=>`<div class="plan ${i===0?'rec':''}"><div class="ph">${t.h}</div><div class="pd">${t.x}</div></div>`).join('');
 showModal(`<h3>AI 安全教練 · 出車前風險評估 — ${d.n} ${AI_TAG}</h3>
 <p>這是「事前」預測，不是事後裁罰。今日整體風險等級：<b style="color:${level[1]}">${level[0]}</b></p>
 ${list}
 <p style="margin-top:11px;font-size:11.5px;color:var(--mut2)">AI 會在對應風險時段提前 30 分主動語音提醒，降低事故發生機率。</p>
 <div class="mb"><button class="btn gho" onclick="closeOv()">關閉</button><button class="btn pri" onclick="act('已開啟今日時段風險提醒，AI 將提前 30 分提醒 ${d.n}。','ok');closeOv()">開啟時段提醒</button></div>`);
}
